<div class="login-container">
  <div class="login-card">
    <!-- Logo: -->
    <div class="logo-container">
      <img src="assets/images/Logo.png" alt="Theca Logo" class="logo-image">
    </div>

    <!-- Formulario: -->
    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <input type="text" [ngModel]="username()" (ngModelChange)="username.set($event)" name="username"
               placeholder="Correo electrónico o nombre de usuario" required>
        @if (errorUsername()) {
          <p class="field-error">{{ errorUsername() }}</p>
        }
      </div>

      <div class="form-group">
        <input type="password" [ngModel]="password()" (ngModelChange)="password.set($event)" name="password"
               placeholder="Contraseña" required>
        @if (errorPassword()) {
          <p class="field-error">{{ errorPassword() }}</p>
        }
      </div>

      <button type="submit" class="btn-login" [disabled]="loading()">Iniciar sesión</button>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }
    </form>

    <div class="register-link">
      <p>¿No tiene cuenta en Theca? <a routerLink="/register">Cree una aquí</a></p>
    </div>
  </div>
</div>
