<div class="busqueda-avanzada-container">
  <div class="busqueda-avanzada-content">
    <h1 class="page-title">BÚSQUEDA AVANZADA</h1>

    <form (ngSubmit)="onSubmit()">
      <div class="form-grid">
        <!-- Columna izquierda: -->
        <div class="form-column">
          <div class="form-group">
            <label>Búsqueda por título:</label>
            <input type="text" [ngModel]="titulo()" (ngModelChange)="titulo.set($event)" name="titulo" placeholder="Título">
          </div>

          <div class="form-group">
            <label>Búsqueda por tipo de recurso:</label>
            <select [ngModel]="tipoId()" (ngModelChange)="tipoId.set($event)" name="tipoId">
              <option value="">Seleccione un tipo</option>
              @for (tipo of tiposDisponibles(); track tipo.id) {
                <option [value]="tipo.id">{{ tipo.nombre }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label>Búsqueda por coincidencia en descripción:</label>
            <input type="text" [ngModel]="descripcion()" (ngModelChange)="descripcion.set($event)" name="descripcion" placeholder="Palabra o frase...">
          </div>

          <div class="form-group">
            <label>Búsqueda por categoría:</label>
            <select [ngModel]="categoriaId()" (ngModelChange)="categoriaId.set($event)" name="categoriaId">
              <option value="">Seleccione una categoría</option>
              @for (cat of categoriasJerarquicas(); track cat.id) {
                <option [value]="cat.id">{{ cat.displayNombre }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label>Fecha de creación:</label>
            <input type="date" [ngModel]="fechaCreacion()" (ngModelChange)="fechaCreacion.set($event)" name="fechaCreacion">
          </div>
        </div>

        <!-- Columna derecha -->
        <div class="form-column">
            <div class="form-group">
              <label>Búsqueda por autor:</label>
              <select [ngModel]="autorId()" (ngModelChange)="autorId.set($event)" name="autorId">
                <option value="">Seleccione un autor</option>
                @for (autor of autoresDisponibles(); track autor.id) {
                  <option [value]="autor.id">{{ autor.nombre }}</option>
                }
              </select>
            </div>

          <div class="form-group">
            <label>Búsqueda por versión:</label>
            <input type="number" step="0.1" [ngModel]="version()" (ngModelChange)="version.set($event)" name="version" placeholder="1.0">
          </div>

          <div class="form-group">
            <label>Búsqueda por estado de sincronización:</label>
            <select [ngModel]="estadoSincronizacion()" (ngModelChange)="estadoSincronizacion.set($event)" name="estadoSincronizacion" disabled>
              <option value="">-- TODO: Sincronización --</option>
            </select>
          </div>

          <div class="form-group">
            <label>Búsqueda por etiqueta:</label>
            <select [ngModel]="etiquetaId()" (ngModelChange)="etiquetaId.set($event)" name="etiquetaId">
              <option value="">Seleccione una etiqueta:</option>
              @for (etiqueta of etiquetasDisponibles(); track etiqueta.id) {
                <option [value]="etiqueta.id">{{ etiqueta.nombre }}</option>
              }
            </select>
          </div>

          <div class="form-group">
            <label>Fecha de modificación:</label>
            <input type="date" [ngModel]="fechaModificacion()" (ngModelChange)="fechaModificacion.set($event)" name="fechaModificacion">
          </div>
        </div>
      </div>

      <div class="form-buttons">
        <button type="button" class="btn-limpiar-filtros" (click)="limpiarCampos()">Limpiar filtros</button>
        <button type="submit" class="btn-buscar" [disabled]="loading()">Buscar</button>
      </div>
    </form>
  </div>
</div>
