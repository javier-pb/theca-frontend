<div class="form-container">
  <div class="form-content">
    <!-- Título: -->
    <h1 class="page-title">{{ esEdicion() ? 'EDITAR RECURSO' : 'AÑADIR RECURSO' }}</h1>

    <form (ngSubmit)="onSubmit()">
      <!-- Fila superior (portada, título y autor): -->
      <div class="form-row-top">
        <div class="portada-column">
          <div class="portada-wrapper">
            <div class="portada-layout">
              <div class="portada-container">
                @if (portada()) {
                  <div class="portada-preview">
                    <img [src]="portada()" alt="Vista previa">
                    <button type="button" class="btn-remove-portada" (click)="eliminarPortada()">✕</button>
                  </div>
                } @else {
                  <div class="portada-placeholder">
                    <img src="assets/images/Imagen.png" alt="Portada" class="portada-image">
                  </div>
                }
              </div>

              <!-- Botón de editar: -->
              <button type="button" class="btn-edit-portada" (click)="abrirSelectorArchivo()">
                <img src="assets/images/Editar.png" alt="Editar" class="icon-edit">
              </button>
            </div>

            <input
              type="file"
              (change)="onFileSelected($event)"
              accept="image/*"
              id="portadaInput"
              style="display: none">
          </div>
        </div>

        <div class="datos-column">
          <div class="form-group">
            <label>*Título:</label>
            <input
              type="text"
              [ngModel]="titulo()"
              (ngModelChange)="titulo.set($event)"
              name="titulo"
              placeholder="Título del recurso">
            @if (errorTitulo()) {
              <p class="field-error">{{ errorTitulo() }}</p>
            }
          </div>

          <div class="form-group">
            <label>Autor/es:</label>
            <div class="select-with-add">
              <select [ngModel]="autoresIds()" (ngModelChange)="autoresIds.set($event)" name="autoresIds">
                <option value="">Seleccione autor/es</option>
                @for (autor of autoresDisponibles(); track autor.id) {
                  <option [value]="autor.id">{{ autor.nombre }}</option>
                }
              </select>
              <button type="button" class="btn-add" (click)="irATipos()">
                <img src="assets/images/Anadir.png" alt="Añadir" class="icon-add">
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>*Tipo de recurso:</label>
          <div class="select-with-add">
            <select [ngModel]="tipoId()" (ngModelChange)="tipoId.set($event)" name="tipoId">
              <option value="">Seleccione un tipo</option>
              @for (tipo of tiposDisponibles(); track tipo.id) {
                <option [value]="tipo.id">{{ tipo.nombre }}</option>
              }
            </select>
            <button type="button" class="btn-add" (click)="irATipos()">
              <img src="assets/images/Anadir.png" alt="Añadir" class="icon-add">
            </button>
          </div>
        </div>

        <div class="form-group half">
          <label>Versión:</label>
          <input
            type="text"
            [ngModel]="version()"
            (ngModelChange)="version.set($event)"
            name="version"
            placeholder="1.0">
        </div>
      </div>

      <div class="form-group">
        <label>Descripción:</label>
        <textarea
          [ngModel]="descripcion()"
          (ngModelChange)="descripcion.set($event)"
          name="descripcion"
          rows="4"
          placeholder="Escriba una breve descripción del recurso..."></textarea>
      </div>

      <div class="form-group">
        <label>Enlace:</label>
        <input
          type="url"
          [ngModel]="enlace()"
          (ngModelChange)="enlace.set($event)"
          name="enlace"
          placeholder="https://www....">
      </div>

      <div class="form-row">
        <div class="form-group half">
          <label>*Añadir categoría/s:</label>
          <div class="select-with-add">
            <select [ngModel]="categoriasIds()" (ngModelChange)="categoriasIds.set($event)" name="categoriasIds">
              <option value="">Seleccione categoría/s</option>
              @for (categoria of categoriasDisponibles(); track categoria.id) {
                <option [value]="categoria.id">{{ categoria.nombre }}</option>
              }
            </select>
            <button type="button" class="btn-add" (click)="irACategorias()">
              <img src="assets/images/Anadir.png" alt="Añadir" class="icon-add">
            </button>
          </div>
        </div>

        <div class="form-group half">
          <label>Añadir etiqueta/s:</label>
          <div class="select-with-add">
            <select [ngModel]="etiquetasIds()" (ngModelChange)="etiquetasIds.set($event)" name="etiquetasIds">
              <option value="">Seleccione etiqueta/s</option>
              @for (etiqueta of etiquetasDisponibles(); track etiqueta.id) {
                <option [value]="etiqueta.id">{{ etiqueta.nombre }}</option>
              }
            </select>
            <button type="button" class="btn-add" (click)="irAEtiquetas()">
              <img src="assets/images/Anadir.png" alt="Añadir" class="icon-add">
            </button>
          </div>
        </div>
      </div>

      @if (loading()) {
        <div class="loading">Guardando...</div>
      }

      @if (errorGeneral()) {
        <div class="error-general">{{ errorGeneral() }}</div>
      }

      <!-- Botón de acción: -->
      <div class="form-actions">
        <button type="submit" class="btn-crear-recurso" [disabled]="loading()">
          {{ esEdicion() ? 'Actualizar recurso' : 'Añadir recurso' }}
        </button>
      </div>
    </form>
  </div>
</div>
